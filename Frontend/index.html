<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сервіс репортів — Варіант 6</title>
  <link rel="stylesheet" href="styles.css" />
 <script type="module" src="./dist/main.js" defer></script>
</head>
<body>
  <div id="globalLoader" class="loader-overlay hidden">
    <div class="spinner">Завантаження...</div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <header class="page-header">
    <div class="topbar">
      <input type="text" id="searchInput" placeholder="Пошук за назвою або автором..." />
      <div class="top-toolbar">
        
        <select id="sortOrder">
          <option value="">Сортувати за...</option>
          <option value="sevDesc">Критичність (від вищої)</option>
          <option value="sevAsc">Критичність (від нижчої)</option>
          <option value="dateDesc">Дата (спочатку нові)</option>
        </select>
        
        <select id="filterStatus">
        </select>
        
        <select id="filterSeverity">
          <option value="">Критичність (усі)</option>
          <option value="Низький">Низький</option>
          <option value="Середній">Середній</option>
          <option value="Високий">Високий</option>
          <option value="Критичний">Критичний</option>
        </select>
        <button id="clearBtn" type="button">Очистити фільтри</button>
      </div>
    </div>
  </header>

  <main class="app">
    <section class="form-panel panel">
      <h2>Створити / Редагувати звіт</h2>
      <form id="reportForm">
        <div class="field">
          <label for="title">Назва вразливості *</label>
          <input type="text" id="title" required />
        </div>
        <div class="field">
          <label for="userId">ID Автора (напр. u1) *</label>
          <input type="text" id="userId" required />
        </div>
        <div class="field">
          <label for="userName">Ім'я Автора *</label>
          <input type="text" id="userName" required />
        </div>
        <div class="field">
          <label for="severity">Критичність *</label>
          <select id="severity" required>
            <option value="" disabled selected>Оберіть критичність</option>
            <option value="Низький">Низький</option>
            <option value="Середній">Середній</option>
            <option value="Високий">Високий</option>
            <option value="Критичний">Критичний</option>
          </select>
        </div>
        <div class="field">
          <label for="status">Статус *</label>
          <select id="status" required>
          </select>
        </div>
        <div class="field">
          <label for="description">Опис *</label>
          <textarea id="description" rows="4" required></textarea>
        </div>
        <div class="actions">
          <button id="submitBtn" type="submit">Додати звіт</button>
        </div>
      </form>
    </section>

    <div class="tables-column">
      <section class="panel list-panel">
        <h2>Список звітів</h2>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr><th>Назва</th><th>Критичність</th><th>Статус</th><th>Опис</th><th>Автор</th><th>Дії</th></tr>
            </thead>
            <tbody id="reportsTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel list-panel">
        <h2>Користувачі</h2>
        <table>
          <thead>
            <tr><th>ID</th><th>Ім'я</th><th>Дії</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </section>
   <section class="panel list-panel">
        <h2>Доступні статуси</h2>
        <div class="field-inline" style="display: flex; gap: 5px; margin-bottom: 10px;">
            <input type="text" id="newStatusName" placeholder="Нова назва..." style="flex: 1;">
            <button id="addStatusBtn" type="button">Додати</button>
        </div>
        <table>
          <thead>
            <tr><th>ID</th><th>Назва</th><th>Дії</th></tr>
          </thead>
          <tbody id="statusesTableBody"></tbody> </table>
      </section>
    </div>
  </main>
</body>
</html>
