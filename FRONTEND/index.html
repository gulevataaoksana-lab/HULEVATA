<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сервіс репортів — Варіант 6</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header class="page-header">
  <div class="topbar">
    <input type="text" id="searchInput" placeholder="Пошук за назвою або автором..." />

    <div class="top-toolbar">
      <select id="filterStatus">
        <option value="">Статус (усі)</option>
      </select>
      <select id="filterSeverity">
        <option value="">Критичність (усі)</option>
        <option value="Низький">Низький</option>
        <option value="Середній">Середній</option>
        <option value="Високий">Високий</option>
        <option value="Критичний">Критичний</option>
      </select>
      <button id="resetFilters" type="button">Скинути фільтри</button>
    </div>
  </div>
  <h1>ЛР1 — Варіант 6: Репорт вразливості</h1>
</header>
  <main class="app">
    <section class="panel form-panel">
      <h2>Форма</h2>
      <form id="reportForm" novalidate>
        <div class="field">
          <label for="userId">ID</label>
          <input type="text" id="userId" placeholder=" " required />
        </div>
        <div class="field">
          <label for="userName">Ім'я автора</label>
          <input type="text" id="userName" placeholder=" " required />
        </div>

        <div class="field">
          <label for="title">Назва вразливості</label>
          <input type="text" id="title" required />
        </div>
        <div class="field">
          <label for="severity">Критичність</label>
          <select id="severity">
            <option value="">Оберіть критичність</option>
            <option value="Низький">Низький</option>
            <option value="Середній">Середній</option>
            <option value="Високий">Високий</option>
            <option value="Критичний">Критичний</option>
          </select>
        </div>
        <div class="field">
          <label for="status">Статус</label>
          <select id="status">
             <option value="">Оберіть статус</option>
          </select>
        </div>
        <div class="field">
          <label for="description">Опис</label>
          <textarea id="description" rows="4"></textarea>
        </div>

        <div class="actions">
          <button id="submitBtn" type="submit">Додати</button>
          <button id="clearBtn" type="button" onclick="this.form.reset()">Очистити</button>
        </div>
        <input type="hidden" id="editId" />
      </form>
    </section>

    <div class="tables-column">
      <section class="panel list-panel">
        <h2>Користувачі</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Ім'я</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </section>

      <section class="panel list-panel">
        <h2>Статуси</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Назва</th>
              <th>Опис</th>
              <th>Дії</th>
            </tr>
          </thead>
          <tbody id="statusesTableBody"></tbody>
        </table>
      </section>

      <section class="panel list-panel">
        <h2>Список звітів</h2>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Назва</th>
                <th>Критичність</th>
                <th>Статус</th>
                <th>Опис</th>
                <th>Автор</th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="reportsTableBody"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
